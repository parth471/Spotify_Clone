<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Home</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
    <div class="logo">Spotify</div>

    <ul class="menu">
        <li class="active">Home</li>
        <li>Search</li>
        <li>Your Library</li>
    </ul>

    <div class="playlist-section">
        <p class="section-title">Playlists</p>
        <ul>
            <li>Liked Songs</li>
            <li>Chill Vibes</li>
            <li>Top Hits</li>
        </ul>
    </div>
</aside>

<!-- Main Content -->
<main class="main">

    <!-- Topbar -->
    <div class="topbar">
        <input type="text" placeholder="What do you want to play?">
        <button class="profile-btn">Profile</button>
    </div>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <h1>Feel the Music.</h1>
            <p>Discover millions of songs curated just for you.</p>
            <button class="primary-btn">Explore Now</button>
        </div>
    </section>

    <!-- Trending Section -->
    <section class="section">
        <h2>Trending Now</h2>

        <div class="card-grid">

            <div class="music-card">
                <img src="https://picsum.photos/300?1">
                <div class="card-info">
                    <h4>Midnight City</h4>
                    <p>Electronic • 2026</p>
                </div>
                <button class="play-btn">▶</button>
            </div>

            <div class="music-card">
                <img src="https://picsum.photos/300?2">
                <div class="card-info">
                    <h4>Neon Dreams</h4>
                    <p>Pop • 2026</p>
                </div>
                <button class="play-btn">▶</button>
            </div>

            <div class="music-card">
                <img src="https://picsum.photos/300?3">
                <div class="card-info">
                    <h4>Chill Mode</h4>
                    <p>Lo-Fi • 2026</p>
                </div>
                <button class="play-btn">▶</button>
            </div>

            <div class="music-card">
                <img src="https://picsum.photos/300?4">
                <div class="card-info">
                    <h4>Energy Boost</h4>
                    <p>Workout • 2026</p>
                </div>
                <button class="play-btn">▶</button>
            </div>

        </div>
    </section>

</main>

<script src="home.js"></script>
</body>
</html>
